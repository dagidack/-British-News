<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Visit statistics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #fff;
        color: #000;
        line-height: 1.4;
        min-height: 100vh;
        padding: 2rem 1rem;
      }

      .wrap {
        max-width: 40rem;
        margin: 0 auto;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.25rem;
      }

      .sub {
        font-size: 0.875rem;
        color: #444;
        margin-bottom: 1.5rem;
      }

      .panel {
        border: 2px solid #000;
        padding: 1.25rem;
        margin-bottom: 1.5rem;
      }

      .login-panel {
        max-width: 22rem;
      }

      label {
        display: block;
        font-size: 0.8125rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 0.35rem;
      }

      input[type="password"] {
        width: 100%;
        border: 2px solid #000;
        padding: 0.5rem 0.65rem;
        font: inherit;
        margin-bottom: 0.75rem;
      }

      button {
        border: 2px solid #000;
        background: #000;
        color: #fff;
        font: inherit;
        font-weight: 600;
        padding: 0.5rem 1rem;
        cursor: pointer;
      }

      button:hover {
        background: #fff;
        color: #000;
      }

      button.secondary {
        background: #fff;
        color: #000;
      }

      .error {
        color: #000;
        border: 2px solid #000;
        padding: 0.65rem;
        margin-bottom: 0.75rem;
        font-size: 0.875rem;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }

      .stat-card {
        border: 2px solid #000;
        padding: 0.85rem;
      }

      .stat-card__value {
        font-size: 1.75rem;
        font-weight: 700;
        line-height: 1.1;
      }

      .stat-card__label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-top: 0.35rem;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }

      th,
      td {
        border-bottom: 1px solid #e6e6e6;
        padding: 0.5rem 0.25rem;
        text-align: left;
      }

      th {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .meta {
        font-size: 0.8125rem;
        color: #444;
      }

      [hidden] {
        display: none !important;
      }
    </style>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <div class="wrap">
      <h1>Visit statistics</h1>
      <p class="sub">Private page — Daily Feed News UK</p>

      <section class="panel login-panel" id="login-panel">
        <form id="login-form">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <p class="error" id="login-error" hidden></p>
          <button type="submit">Sign in</button>
        </form>
      </section>

      <section id="dashboard" hidden>
        <div class="toolbar">
          <p class="meta" id="updated-at"></p>
          <button type="button" class="secondary" id="logout-btn">Sign out</button>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-card__value" id="stat-today-views">—</div>
            <div class="stat-card__label">Views today</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__value" id="stat-today-unique">—</div>
            <div class="stat-card__label">Unique today</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__value" id="stat-week-views">—</div>
            <div class="stat-card__label">Views (7 days)</div>
          </div>
          <div class="stat-card">
            <div class="stat-card__value" id="stat-total">—</div>
            <div class="stat-card__label">All-time views</div>
          </div>
        </div>

        <div class="panel">
          <h2 style="font-size: 1rem; margin-bottom: 0.75rem">Last 14 days</h2>
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Views</th>
                <th>Unique</th>
              </tr>
            </thead>
            <tbody id="recent-days"></tbody>
          </table>
        </div>

        <p class="meta" id="last-visit"></p>
      </section>

      <section class="panel" id="unavailable" hidden>
        <p>Statistics are not configured on this server. Set the <code>STATS_PASSWORD</code> environment variable and restart.</p>
      </section>
    </div>

    <script>
      const loginPanel = document.getElementById("login-panel");
      const dashboard = document.getElementById("dashboard");
      const unavailable = document.getElementById("unavailable");
      const loginForm = document.getElementById("login-form");
      const loginError = document.getElementById("login-error");
      const passwordInput = document.getElementById("password");

      function showLogin(message) {
        dashboard.hidden = true;
        loginPanel.hidden = false;
        unavailable.hidden = true;
        if (message) {
          loginError.textContent = message;
          loginError.hidden = false;
        } else {
          loginError.hidden = true;
        }
      }

      function showDashboard(data) {
        loginPanel.hidden = true;
        unavailable.hidden = true;
        dashboard.hidden = false;
        loginError.hidden = true;

        document.getElementById("stat-today-views").textContent = data.todayViews;
        document.getElementById("stat-today-unique").textContent = data.todayUniqueVisitors;
        document.getElementById("stat-week-views").textContent = data.weekViews;
        document.getElementById("stat-total").textContent = data.totalViews;

        document.getElementById("updated-at").textContent = `Updated ${new Date(data.generatedAt).toLocaleString("en-GB", { timeZone: data.timezone })} (${data.timezone})`;

        document.getElementById("recent-days").innerHTML = data.recentDays
          .slice()
          .reverse()
          .map(
            (day) =>
              `<tr><td>${day.date}</td><td>${day.views}</td><td>${day.uniqueVisitors}</td></tr>`
          )
          .join("");

        document.getElementById("last-visit").textContent = data.lastVisit
          ? `Last recorded visit: ${new Date(data.lastVisit).toLocaleString("en-GB", { timeZone: data.timezone })}`
          : "No visits recorded yet.";
      }

      async function loadSummary() {
        const res = await fetch("/api/stats/summary");
        if (res.status === 401) {
          showLogin();
          return;
        }
        if (res.status === 503) {
          loginPanel.hidden = true;
          dashboard.hidden = true;
          unavailable.hidden = false;
          return;
        }
        if (!res.ok) throw new Error("Could not load statistics.");
        showDashboard(await res.json());
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        loginError.hidden = true;

        const res = await fetch("/api/stats/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: passwordInput.value }),
        });

        if (!res.ok) {
          showLogin("Incorrect password.");
          passwordInput.value = "";
          passwordInput.focus();
          return;
        }

        passwordInput.value = "";
        await loadSummary();
      });

      document.getElementById("logout-btn").addEventListener("click", async () => {
        await fetch("/api/stats/logout", { method: "POST" });
        showLogin();
        passwordInput.focus();
      });

      loadSummary().catch(() => showLogin("Could not load statistics."));
    </script>
  </body>
</html>
